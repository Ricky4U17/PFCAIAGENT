<script>
/* =====================================================================================
   SimAgentField — Simulation-Agent field-package schema + loader (mergeable module)
   - No design data is hard-coded. Material, geometry, stack, wire, window utilization,
     ambient, and (optionally) solved field grids all arrive in ONE injected package.
   - If no package is injected, a clearly-labelled EXAMPLE_PACKAGE renders a preview only.
   - Loader prefers solver fields (FEA/CFD/measured ROM); otherwise falls back to the
     analytic model. Every quantity carries provenance (fea | analytic | measured | input).
   - Headless API for the parent agent: SimAgentField.evaluateHeadless(pkg, op).
   Inject upstream via:  window.__MAG_FIELD_PACKAGE__  (full package, preferred)
                  or:    window.__MAG_INPUT__          (scalar model only -> analytic fields)
   ===================================================================================== */
(function(global){
'use strict';
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)), lerp=(a,b,t)=>a+(b-a)*t;
const isObj=x=>x&&typeof x==='object'&&!Array.isArray(x);
function deepMerge(base,patch){const out=Array.isArray(base)?base.slice():{...base};Object.keys(patch||{}).forEach(k=>{const b=out[k],p=patch[k];out[k]=(isObj(b)&&isObj(p))?deepMerge(b,p):p});return out}
function interp1(xs,ys,x){if(!xs||!xs.length)return null;if(x<=xs[0])return ys[0];if(x>=xs[xs.length-1])return ys[ys.length-1];for(let i=0;i<xs.length-1;i++){if(x>=xs[i]&&x<=xs[i+1])return lerp(ys[i],ys[i+1],(x-xs[i])/(xs[i+1]-xs[i]))}return ys[ys.length-1]}
function mapInterp(map,x,fb){if(!isObj(map))return fb;const ks=Object.keys(map).map(Number).filter(Number.isFinite).sort((a,b)=>a-b);if(!ks.length)return fb;return interp1(ks,ks.map(k=>map[k]),x)}

/* ---------------- 1. SCHEMA (the contract; self-documenting) ---------------- */
const SCHEMA={
 schemaVersion:'1.0',
 describe(){return {
  schemaVersion:'1.0',
  meta:{units:{length:'mm',B:'T',H:'Oe',R:'ohm',T:'degC',P:'W',f:'Hz'},
    provenance:{agent1:'analytic',agent2:'fea|null',simAgent:'rom|null',measured:'bool'},
    generatedAt:'ISO-8601',
    envelope:{vin:'[Vac]',loadPct:'[%rated]',phase:'[0..1 half-cycle] (optional)'}},
  model:{/* ALL injected from previous steps - nothing hard-coded */
    design:'{Vout,fsw,lineHz,Prated,nph,vinMin,vinMax,vinDefault,loadDefaultPct,specLowLineMaxPct,specHighLineMaxPct}',
    environment:'{Tamb_C}',
    winding:'{N,stacks,leadLength_mm, window?{Ku,layersNeeded,turnsPerLayer,radialBuild_mm,boreHoleR_mm,bundleOD_mm}}',
    geometry:'{OD_mm,ID_mm,stackHeight_mm,Ae_mm2,Le_mm,Ve_mm3}',
    material:'{name,AL_nH,mui,Bsat,steinmetz{a,b,c},retention{k0,k1,p}}',
    copper:'{wire{type,strands,strandDia_mm,parallel,fillFactor}, measured{RdcTotal_20C?,RdcPerMeter_20C?}, alphaCu,rho20_ohm_m,refDeltaT_C, prox{kSkin,kProx,kCrowd}}',
    cooling:'{mode,airScale,orientationFactor,boardPathFactor,radiationFactor,hotspotFactor,splitCoreAmbient,splitWdgAmbient,coupleCoreWdg,CthCore_J_perK,CthWdg_J_perK,warmupMinutesDefault}',
    maps:'{etaByVin{},crestByVin{}}', labels:'{family,source}'},
  fields:{/* OPTIONAL solved ROM; any absent field => analytic fallback */
    inductance:'{H:[Oe], L_uH:[uH], provenance}',                       // biased L(H) from magnetostatic FEA
    flux:'{radial:{r_mm:[],crowd:[B(r)/Bmean]}, grid?{r_mm,z_mm,B,indexedBy}, provenance}',
    windingAC:'{freq_Hz:[], RacOverRdc:[], perLayer?[[]], provenance}', // eddy-current FEA
    thermal:'{nodes{Rca_KperW,Rwa_KperW,Rcw_KperW}|{thetaSA_KperW}, airflow_mps?, grid?{r_mm,z_mm,Trise_perW}, provenance}'},
  acceptance:'{Bmax_T?,Ku_max?,J_max_Apmm2?,dT_max_K?}  (optional limits for pass/fail)'
 }}
};

/* ---------------- 2. EXAMPLE package (PREVIEW ONLY - not used when upstream injects) ---------------- */
const EXAMPLE_PACKAGE={
 schemaVersion:'1.0', __preview:true,
 meta:{units:{length:'mm',B:'T',H:'Oe',R:'ohm',T:'degC',P:'W',f:'Hz'},
   provenance:{agent1:'analytic',agent2:null,simAgent:null,measured:false},
   generatedAt:null, envelope:{vin:[90,132,180,230,264],loadPct:[25,50,75,100],phase:null}},
 model:{
   design:{Vout:390,fsw:70000,lineHz:60,Prated:3600,nph:2,vinMin:90,vinMax:264,vinDefault:180,loadDefaultPct:100,specLowLineMaxPct:47.2,specHighLineMaxPct:100},
   environment:{Tamb_C:50},
   winding:{N:32,stacks:2,leadLength_mm:60},
   geometry:{OD_mm:40.94,ID_mm:21.27,stackHeight_mm:17.89,Ae_mm2:153,Le_mm:94,Ve_mm3:14600},
   material:{name:'EDGE 60 µ',AL_nH:122,mui:60,Bsat:1.5,steinmetz:{a:86.7,b:2.106,c:1.444},retention:{k0:0.01,k1:9.202e-10,p:3.044}},
   copper:{wire:{type:'litz',strands:348,strandDia_mm:0.10,parallel:1,fillFactor:0.55},measured:{RdcTotal_20C:null,RdcPerMeter_20C:null},alphaCu:0.00393,rho20_ohm_m:1.724e-8,refDeltaT_C:80,prox:{kSkin:0.5,kProx:0.40,kCrowd:0.25}},
   cooling:{mode:'natural',airScale:1.0,orientationFactor:1.0,boardPathFactor:1.0,radiationFactor:1.0,hotspotFactor:1.12,splitCoreAmbient:1.0,splitWdgAmbient:0.9,coupleCoreWdg:0.5,CthCore_J_perK:55,CthWdg_J_perK:28,warmupMinutesDefault:20},
   maps:{etaByVin:{90:0.9437,110:0.9536,120:0.9635,132:0.9728,180:0.9543,200:0.9637,220:0.9643,230:0.9672,264:0.9424},crestByVin:{}},
   labels:{family:'PREVIEW example',source:'embedded fallback (no upstream package)'}},
 fields:{},                                   // empty => everything analytic
 acceptance:{Bmax_T:1.5,Ku_max:0.6,dT_max_K:60}
};

/* ---------------- 3. validator ---------------- */
function validatePackage(pkg){
 const errors=[],warnings=[];
 if(!pkg||!isObj(pkg)){return {ok:false,errors:['package missing/not an object'],warnings,present:{}}}
 const m=pkg.model||{};
 const need={ 'model.design':m.design,'model.environment':m.environment,'model.winding':m.winding,'model.geometry':m.geometry,'model.material':m.material,'model.copper':m.copper,'model.cooling':m.cooling };
 Object.keys(need).forEach(k=>{ if(!need[k]) errors.push('missing required '+k) });
 if(m.copper&&!m.copper.wire) errors.push('missing model.copper.wire (type/strands/strandDia)');
 if(m.material&&(!m.material.steinmetz||!m.material.retention)) errors.push('missing material.steinmetz/retention');
 if(pkg.__preview) warnings.push('running on PREVIEW example - no upstream field package injected');
 const f=pkg.fields||{};
 const present={inductance:!!f.inductance,flux:!!f.flux,windingAC:!!f.windingAC,thermal:!!f.thermal};
 if(!present.inductance) warnings.push('fields.inductance absent -> L(H) analytic');
 if(!present.windingAC)  warnings.push('fields.windingAC absent -> R_ac analytic');
 if(!present.thermal)    warnings.push('fields.thermal absent -> thermal analytic');
 if(!present.flux)       warnings.push('fields.flux absent -> B(r) analytic (1/r crowding)');
 return {ok:errors.length===0,errors,warnings,present};
}

/* ---------------- 4. AnalyticModel (pure physics from the scalar model) ---------------- */
function AnalyticModel(model){
 const MU0=4e-7*Math.PI;
 const cfg=model.design, winding=model.winding, geomIn=model.geometry, mat=model.material, cu=model.copper, cool=model.cooling, maps=model.maps||{};
 const geom={OD:geomIn.OD_mm,ID:geomIn.ID_mm,rin:geomIn.ID_mm/2,rout:geomIn.OD_mm/2,rmean:(geomIn.ID_mm/2+geomIn.OD_mm/2)/2,w:(geomIn.OD_mm-geomIn.ID_mm)/2,h:geomIn.stackHeight_mm*winding.stacks};
 const N=+winding.N, stacks=+winding.stacks, Tamb=+model.environment.Tamb_C, crowdAxial=geom.rmean/geom.rin;
 const retention=H=>{const r=mat.retention;return 1/(r.k0+r.k1*Math.pow(Math.max(H,0),r.p))/100};
 const Ac=mat.steinmetz.c, IC=3.5435, IK=Math.pow(2,Ac)/(Math.pow(2*Math.PI,Ac-1)*IC);
 const Fd=D=>{D=clamp(D,0.02,0.98);return IK*(Math.pow(D,1-Ac)+Math.pow(1-D,1-Ac))};
 const MAG=(()=>{const a=[];for(let H=0;H<=160;H+=2)a.push({H,B:MU0*mat.mui*retention(H)*H*79.577});return a})();
 const etapf=v=>mapInterp(maps.etaByVin,v,0.95);
 const crestIL=(vin,lf)=>{const mp=mapInterp(maps.crestByVin,vin,null);if(mp!=null&&isFinite(mp)&&mp>0)return mp*lf;return Math.SQRT2*(lf*cfg.Prated)/(Math.max(etapf(vin),0.5)*vin*cfg.nph)};
 const specMaxPct=v=>{if(v<=132)return cfg.specLowLineMaxPct;if(v>=180)return cfg.specHighLineMaxPct;return null};
 // window utilization: prefer injected winding.window, else compute from wire+geometry
 function cuArea_m2(){const w=cu.wire;return Math.max(w.strands,1)*Math.max(w.parallel||1,1)*Math.PI*Math.pow(w.strandDia_mm*1e-3/2,2)}
 function bundleOD_mm(){const w=cu.wire,n=Math.max(w.strands*(w.parallel||1),1);if(n<=1)return w.strandDia_mm*1.08;return 2*Math.sqrt((cuArea_m2()*1e6)/Math.max(w.fillFactor||0.55,0.2)/Math.PI)}
 function windowGeom(){const inj=winding.window;
   if(inj&&isFinite(inj.layersNeeded)){const od=inj.bundleOD_mm||bundleOD_mm();return {bundleOD:od,turnsPerLayer:inj.turnsPerLayer||Math.ceil(N/inj.layersNeeded),layersNeeded:inj.layersNeeded,radialBuildActual_mm:inj.radialBuild_mm||inj.layersNeeded*od,boreHoleR_mm:(inj.boreHoleR_mm!=null?inj.boreHoleR_mm:geom.rin-(inj.radialBuild_mm||inj.layersNeeded*od)),Ku:inj.Ku!=null?inj.Ku:N*cuArea_m2()*1e6/(Math.PI*geom.rin*geom.rin),source:'input'}}
   const od=bundleOD_mm(),tpl=Math.max(1,Math.floor(2*Math.PI*Math.max(geom.rin-od/2,od)/od)),layers=Math.max(1,Math.ceil(N/tpl)),rb=layers*od;
   return {bundleOD:od,turnsPerLayer:tpl,layersNeeded:layers,radialBuildActual_mm:rb,boreHoleR_mm:geom.rin-rb,Ku:N*cuArea_m2()*1e6/(Math.PI*geom.rin*geom.rin),source:'computed',overfull:(geom.rin-rb)<0}}
 const skinDepth=()=>Math.sqrt(cu.rho20_ohm_m/(Math.PI*cfg.fsw*MU0));
 const mltMeters=()=>(2*(geom.w+geom.h)+2*bundleOD_mm())/1000;
 function Rdc0(){const A=cuArea_m2(),Ltot=N*mltMeters()+(winding.leadLength_mm||0)/1000,kT=(1+cu.alphaCu*cu.refDeltaT_C);
   if(cu.measured&&cu.measured.RdcTotal_20C)return cu.measured.RdcTotal_20C*kT;
   if(cu.measured&&cu.measured.RdcPerMeter_20C)return cu.measured.RdcPerMeter_20C*Ltot*kT;
   return cu.rho20_ohm_m*kT*Ltot/Math.max(A,1e-12)}
 function racRatio(f){const x=(cu.wire.strandDia_mm*1e-3)/Math.max(2*Math.sqrt(cu.rho20_ohm_m/(Math.PI*f*MU0)),1e-12),wg=windowGeom();
   const Fskin=1+cu.prox.kSkin*x*x,Fprox=1+cu.prox.kProx*Math.max(wg.layersNeeded-1,0)*x*x*(1+cu.prox.kCrowd*(crowdAxial-1));return Fskin*Fprox}
 const Lh=H=>mat.AL_nH*stacks*1e-9*N*N*retention(H);                 // henries, biased
 const bCrowd=r=>geom.rmean/r;                                       // analytic 1/r
 function surfaceArea_cm2(){const wg=windowGeom(),od=wg.bundleOD,ODe=geom.OD+2*od,He=geom.h+2*od,bore=2*Math.max(wg.boreHoleR_mm,0.5);return (Math.PI*ODe*He+2*(Math.PI/4)*(ODe*ODe-bore*bore)+Math.PI*bore*He)/100}
 function thermalR(Pcore,Pcu){const SA=Math.max(surfaceArea_cm2(),1e-3),Ptot=Math.max(Pcore+Pcu,1e-6);
   const dT_nat=Math.pow(Ptot*1000/SA,0.833),cmult=(cool.mode==='forced'?0.55:1.0)/(Math.max(cool.airScale,0.25)*Math.max(cool.orientationFactor,0.3)*Math.sqrt(Math.max(cool.boardPathFactor,0.25)*Math.max(cool.radiationFactor,0.25)));
   const theta=(dT_nat*cmult)/Ptot,sC=Math.max(cool.splitCoreAmbient,0.05),sW=Math.max(cool.splitWdgAmbient,0.05),sum=sC+sW;
   return {Rca:theta*sum/sC,Rwa:theta*sum/sW,Rcw:Math.max(theta*cool.coupleCoreWdg,1e-3)}}
 return {MU0,cfg,winding,geomIn,mat,cu,cool,geom,N,stacks,Tamb,crowdAxial,retention,Fd,MAG,etapf,crestIL,specMaxPct,
   cuArea_m2,bundleOD_mm,windowGeom,skinDepth,mltMeters,Rdc0,racRatio,Lh,bCrowd,surfaceArea_cm2,thermalR};
}

/* ---------------- 5. FieldPackage loader (solver fields override analytic) ---------------- */
function FieldPackage(pkg, am){
 const f=pkg.fields||{};
 const prov={
  inductance:f.inductance?(f.inductance.provenance||'fea'):'analytic',
  flux:f.flux?(f.flux.provenance||'fea'):'analytic',
  windingAC:f.windingAC?(f.windingAC.provenance||'fea'):'analytic',
  thermal:f.thermal?(f.thermal.provenance||'fea'):'analytic',
  window:am.windowGeom().source==='input'?'input':'computed'};
 // L(H) henries
 const Lh=H=>{const fi=f.inductance;if(fi&&fi.H&&fi.L_uH){const v=interp1(fi.H,fi.L_uH,H);if(v!=null)return v*1e-6}return am.Lh(H)};
 // B(r)/Bmean crowd ratio
 const bCrowd=r=>{const fl=f.flux;if(fl&&fl.radial&&fl.radial.r_mm&&fl.radial.crowd){const v=interp1(fl.radial.r_mm,fl.radial.crowd,r);if(v!=null)return v}return am.bCrowd(r)};
 // Rac/Rdc at frequency
 const racRatio=fr=>{const w=f.windingAC;if(w&&w.freq_Hz&&w.RacOverRdc){const v=interp1(w.freq_Hz,w.RacOverRdc,fr);if(v!=null)return v}return am.racRatio(fr)};
 // thermal node resistances
 const thermalR=(Pcore,Pcu)=>{const t=f.thermal;if(t&&t.nodes){const n=t.nodes;if(isFinite(n.Rca_KperW)&&isFinite(n.Rwa_KperW))return {Rca:n.Rca_KperW,Rwa:n.Rwa_KperW,Rcw:isFinite(n.Rcw_KperW)?n.Rcw_KperW:n.Rca_KperW*0.5};
   if(isFinite(n.thetaSA_KperW)){const th=n.thetaSA_KperW;return {Rca:th*2,Rwa:th*2,Rcw:th*0.5}}}return am.thermalR(Pcore,Pcu)};
 return {prov,Lh,bCrowd,racRatio,thermalR};
}

/* ---------------- 6. Evaluator (combines model + analytic + fields; headless-capable) ---------------- */
function Evaluator(rawPkg){
 const pkg=rawPkg||EXAMPLE_PACKAGE;
 const model=pkg.model;
 const am=AnalyticModel(model);
 const fp=FieldPackage(pkg,am);
 const {cfg,mat,cu,cool,geom,N,stacks,Tamb,geomIn}=am;
 const crowdPeak=fp.bCrowd(geom.rin);
 function opPoint(vin,lf,warmMin){
   const Ic=am.crestIL(vin,lf),Vpk=vin*Math.SQRT2,Ae=geomIn.Ae_mm2*stacks*1e-6,Ve=geomIn.Ve_mm3*stacks/1000,Le=geomIn.Le_mm/10;
   const Rdc0=am.Rdc0(),Rac0=Rdc0*fp.racRatio(cfg.fsw),Lfull=fp.Lh(0.4*Math.PI*N*Ic/Le);
   let pc=0,i2=0,r2=0;const M=240;
